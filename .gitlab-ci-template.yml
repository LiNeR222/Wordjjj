stages:
- build
- deploy
######
- audit
- lint

workflow:
  rules:
  - if: '$CI_COMMIT_BRANCH == "main"'

before_script:
- apk add --no-cache curl

after_script:
- |
  PIPELINE_URL=${CI_PIPELINE_URL:-"https://gitlab.com/$CI_PROJECT_PATH/pipelines/$CI_PIPELINE_ID"}
  JOB_URL=${CI_JOB_URL:-$PIPELINE_URL}

  if [ "$CI_JOB_STATUS" != "success" ]; then
    curl -s -X POST "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
      -d chat_id="$TELEGRAM_CHAT_ID" \
      -d text="❌ Pipeline [$CI_PIPELINE_ID]($PIPELINE_URL) в проекте *$CI_PROJECT_NAME* провалился в [$CI_JOB_NAME]($JOB_URL)!" \
      -d parse_mode="Markdown"
  else
    curl -s -X POST "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
      -d chat_id="$TELEGRAM_CHAT_ID" \
      -d text="✅ Pipeline [$CI_PIPELINE_ID]($PIPELINE_URL) в проекте *$CI_PROJECT_NAME* успешно завершён в [$CI_JOB_NAME]($JOB_URL)!" \
      -d parse_mode="Markdown"
  fi
- |
  # Выполняем очистку образов
  docker image prune -f
  
  # Проверяем статус выполнения команды
  if [[ $? -ne 0 ]]; then
    echo "❌ Ошибка: Не удалось очистить образы!"
    exit 1
  fi

  echo "✅ Очистка завершена!"

